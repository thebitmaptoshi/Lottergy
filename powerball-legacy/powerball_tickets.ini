# =========================================================================
# Powerball ticket-generator configuration.
# Edit values below, then re-run:  python powerball_tickets.py
# Lines starting with '#' or ';' are comments.
# All percentages are draw-appearance rates (share of draws the ball
# appeared in), matching the analyzer output. Current-matrix baselines:
#   uniform white ball = 5 / 69 = 7.246%
#   uniform powerball  = 1 / 26 = 3.846%
# =========================================================================

[pool]
# Which balls are eligible to be drawn into your tickets.
# A ball is included if BOTH conditions pass:
#   - its frequency % is STRICTLY GREATER than min_frequency_pct
#   - it is within the top_n most-frequent balls (0 = no cap)
# Set min_frequency_pct = 0 and top_n = 0 to allow every ball.

white_ball_min_frequency_pct = 7.50
white_ball_top_n             = 0

red_ball_min_frequency_pct   = 3.85
red_ball_top_n               = 0

# Optional "exclude the hottest" filter. Drops the top N% of balls by
# frequency BEFORE the min_frequency_pct / top_n filters apply, so you
# can deliberately pick from less-frequent ("due") numbers while keeping
# every other constraint intact. 0 = exclude nothing (default).
#
# Examples:
#   white_ball_exclude_top_percent = 50  -> drop the hottest 50% (~34 balls),
#       then choose from the cooler ~35. Typically pair with
#       white_ball_min_frequency_pct = 0 so the lower filter doesn't fight it.
#   white_ball_exclude_top_percent = 25  -> drop just the top quarter.
white_ball_exclude_top_percent = 0
red_ball_exclude_top_percent   = 0


[constraints]
# HARD constraints. Tickets failing any of these are rejected outright.

# Sum of the 5 white balls must fall in [sum_min, sum_max] inclusive.
sum_min = 125
sum_max = 224

# Allowed count of ODD white balls (comma-separated).
# 2,3   means "2/3 or 3/2 odd/even split only".
allowed_odd_counts = 2,3

# Allowed count of LOW white balls (whites <= low_cutoff), comma-separated.
# 2,3   means "2/3 or 3/2 low/high split only".
allowed_low_counts = 2,3
low_cutoff         = 34

# Maximum number of consecutive pairs allowed (e.g. 22-23 counts as 1 pair).
max_consecutive_pairs = 1

# Decade-span range (number of distinct decades 1-10, 11-20, ... the 5 whites
# occupy). Inclusive on both ends. 5 whites can occupy at most 5 decades.
#   Tight 4-only spread:  min=4, max=4
#   Allow 3 thru 5:       min=3, max=5
min_decade_span = 3
max_decade_span = 4


[preferences]
# SOFT preferences. Each weight is the probability of ACCEPTING an otherwise-
# valid ticket that has the less-preferred trait.
#   1.0 = no penalty (the trait is accepted as readily as the preferred trait)
#   0.5 = accept ~half the time
#   0.0 = effectively rejected (equivalent to a hard constraint)

# Penalty for a ticket having 1 consecutive pair instead of 0.
weight_one_consecutive_pair = 0.55


[output]
# How many tickets to generate.
num_tickets = 10

# Also write the run's output to a dated text file in the script's folder.
# Filename format: "top {num_tickets}-{YYYY-MM-DD}.txt".
# Set to false to print to terminal only.
save_to_file = true
